async function getYearStartPrice(code, year) {
  const prefix = code.startsWith('sh') ? 'sh' : 'sz';
  const num = code.replace(/^[a-z]+/, '');
  const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${prefix}${num},day,${year}-01-01,${year}-01-10,10,qfq`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    const stockData = data.data?.[`${prefix}${num}`];
    if (!stockData) return null;
    const days = stockData.qfqday || stockData.day;
    if (!days || days.length === 0) return null;
    return parseFloat(days[0][2]);
  } catch (e) { return null; }
}

async function fetchETFData() {
  const codes = Object.keys(ETF_CODES).join(',');
  const url = `https://qt.gtimg.cn/q=${codes}`;
  try {
    const response = await fetch(url);
    const text = await response.text();
    const currentData = {};
    const lines = text.trim().split(';').filter(l => l.trim());
    for (const line of lines) {
      const match = line.match(/v_([a-z]{2}\d{6})="(.*)"/);
      if (!match) continue;
      const key = match[1];
      const fields = match[2].split('~');
      if (fields.length < 35) continue;
      currentData[key] = {
        code: fields[2],
        currentPrice: parseFloat(fields[3]),
        changePct: parseFloat(fields[32]),
      };
    }
    // 获取年初收盘价并计算 YTD
    const year = new Date().getFullYear();
    const yearStartPromises = Object.keys(ETF_CODES).map(async (key) => {
      const price = await getYearStartPrice(key, year);
      return { key, price };
    });
    const yearStartResults = await Promise.all(yearStartPromises);
    const etfs = [];
    for (const key of Object.keys(ETF_CODES)) {
      const current = currentData[key];
      const yearStart = yearStartResults.find(r => r.key === key);
      let ytd = DEFAULT_YTD[key] || 0;
      if (current && yearStart && yearStart.price && yearStart.price > 0) {
        const calcYtd = ((current.currentPrice - yearStart.price) / yearStart.price * 100);
        if (!isNaN(calcYtd)) ytd = calcYtd;
      }
      etfs.push({
        code: current?.code || key.replace(/^[a-z]+/, ''),
        name: ETF_CODES[key],
        sector: classifySector(ETF_CODES[key]),
        daily: current?.changePct || 0,
        ytd: parseFloat(ytd.toFixed(2)),
      });
    }
    return etfs;
  } catch (e) { console.error('fetchETFData failed', e); return null; }
}

function classifySector(name) {
  const n = name;
  if (n.includes('新能源车')) return '新能源/汽车';
  if (n.includes('光伏')) return '新能源/光伏';
  if (n.includes('新能源')) return '新能源';
  if (n.includes('医疗创新')) return '医药/医疗';
  if (n.includes('医疗')) return '医药/医疗';
  if (n.includes('中药')) return '医药/中药';
  if (n.includes('稀土')) return '有色金属/稀土';
  if (n.includes('稀有金属') || n.includes('有色金属')) return '有色金属/材料';
  if (n.includes('半导体') || n.includes('芯片') || n.includes('科创芯片')) return '半导体/芯片';
  if (n.includes('通信')) return '通信';
  if (n.includes('证券') || n.includes('券商')) return '金融/非银';
  if (n.includes('银行')) return '金融/银行';
  if (n.includes('黄金')) return '黄金/贵金属';
  if (n.includes('煤炭')) return '能源/煤炭';
  if (n.includes('机器人')) return '机器人/制造';
  if (n.includes('央企')) return '央企/改革';
  if (n.includes('云计算')) return '科技/云计算';
  if (n.includes('计算机')) return '科技/计算机';
  if (n.includes('软件')) return '科技/软件';
  if (n.includes('红利')) return '红利/策略';
  if (n.includes('基建')) return '基建/建筑';
  if (n.includes('国防') || n.includes('军工')) return '国防/军工';
  if (n.includes('家电')) return '消费/家电';
  if (n.includes('钢铁')) return '钢铁/材料';
  if (n.includes('房地产')) return '房地产';
  if (n.includes('游戏')) return '传媒/文娱';
  if (n.includes('传媒') || n.includes('影视')) return '传媒/文娱';
  if (n.includes('食品') || n.includes('饮料')) return '消费/食品饮料';
  if (n.includes('酒') || n.includes('白酒')) return '消费/白酒';
  if (n.includes('教育')) return '教育';
  return '其他';
}

function tryLoadFromExtension() {
  try {
    chrome.storage?.local?.get(['aidinpan_etfs', 'last_update'], (result) => {
      if (result?.aidinpan_etfs && result.aidinpan_etfs.length > 0) {
        etfData = result.aidinpan_etfs.map(e => ({ ...e, sector: classifySector(e.name) }));

        const age = result.last_update ? Math.round((Date.now() - result.last_update) / 1000) : 0;
        const ageStr = age < 60 ? '刚刚' : age < 3600 ? `${Math.round(age/60)}分钟前` : `${Math.round(age/3600)}小时前`;

function updateStatus(msg) {

// ======================== 核心分析 ========================
function analyzeSectors(data) {
  const map = {};
  data.forEach(e => {
    if (!map[e.sector]) map[e.sector] = [];
    map[e.sector].push(e);
  });
  return Object.entries(map).map(([sector, list]) => ({
    sector, count: list.length,
    avgDaily: +(list.reduce((s, x) => s + x.daily, 0) / list.length).toFixed(2),
    avgYtd: +(list.reduce((s, x) => s + x.ytd, 0) / list.length).toFixed(2),
  }));
}

function renderBadge(val) {
  if (val > 0) return `<span class="badge up">+${val}%</span>`;
  if (val < 0) return `<span class="badge down">${val}%</span>`;
  return `<span class="badge flat">0%</span>`;
}

// ======================== ECharts 渲染 ========================
function renderCharts() {
  const sectors = analyzeSectors(etfData);
  const dailySorted = [...sectors].sort((a, b) => a.avgDaily - b.avgDaily);
  const ytdSorted = [...sectors].sort((a, b) => a.avgYtd - b.avgYtd);

  const upColor = '#ff7b72';
  const downColor = '#7ee787';
  const gridColor = '#30363d';
  const textColor = '#c9d1d9';

  const commonOption = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'shadow' },
      backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: textColor },
      formatter: function(params) {
        const p = params[0];
        return p.name + '<br/>' + p.seriesName + ': ' + (p.value >= 0 ? '+' : '') + p.value + '%';
      }
    },
    grid: { left: '22%', right: '18%', top: '3%', bottom: '3%' },
    xAxis: {
      type: 'value', axisLabel: { color: '#8b949e', fontSize: 11, formatter: '{value}%' },
      splitLine: { lineStyle: { color: gridColor, type: 'dashed' } },
      axisLine: { lineStyle: { color: gridColor } }
    },
    yAxis: {
      type: 'category', 
      axisLabel: { color: textColor, fontSize: 11, interval: 0, width: 130, overflow: 'break' },
      axisLine: { lineStyle: { color: gridColor } }, axisTick: { show: false }
    },
    animationDuration: 600
  };

  if (!dailyChart) dailyChart = echarts.init(document.getElementById('dailyChart'));
  dailyChart.setOption({
    ...commonOption,
    yAxis: { ...commonOption.yAxis, data: dailySorted.map(s => s.sector) },
    series: [{
      name: '当日涨跌', type: 'bar',
      data: dailySorted.map(s => ({
        value: s.avgDaily,
        itemStyle: { color: s.avgDaily >= 0 ? upColor : downColor, borderRadius: 3 }
      })),
      label: {
        show: true, position: 'right', color: textColor, fontSize: 11, fontWeight: 'bold',
        formatter: function(p) {
          const s = dailySorted[p.dataIndex];
          return (p.value >= 0 ? '+' : '') + p.value + '%  (' + s.count + '只)';
        }
      },
      barWidth: '55%'
    }]
  }, true);

  if (!ytdChart) ytdChart = echarts.init(document.getElementById('ytdChart'));
  ytdChart.setOption({
    ...commonOption,
    grid: { left: '22%', right: '22%', top: '3%', bottom: '3%' },
    yAxis: { ...commonOption.yAxis, data: ytdSorted.map(s => s.sector) },
    series: [{
      name: '年度涨跌', type: 'bar',
      data: ytdSorted.map(s => ({
        value: s.avgYtd,
        itemStyle: { color: s.avgYtd >= 0 ? upColor : downColor, borderRadius: 3 }
      })),
      label: {
        show: true, position: 'right', color: textColor, fontSize: 11, fontWeight: 'bold',
        formatter: function(p) {
          const s = ytdSorted[p.dataIndex];
          return (p.value >= 0 ? '+' : '') + p.value + '%  (' + s.count + '只)';
        }
      },
      barWidth: '55%'
    }]
  }, true);
}

// ======================== 表格和统计 ========================
function renderTable() {
  let sorted = [...etfData];
  sorted.sort((a, b) => {
    if (typeof a[sortCol] === 'number') return sortDir === 'asc' ? a[sortCol] - b[sortCol] : b[sortCol] - a[sortCol];
    return sortDir === 'asc' ? a[sortCol].localeCompare(b[sortCol]) : b[sortCol].localeCompare(a[sortCol]);
  });
  const tbody = document.getElementById('etfTableBody');
  tbody.innerHTML = sorted.map(e => `
    <tr>
      <td><span class="etf-name">${e.name}</span></td>
      <td><span class="etf-code">${e.code}</span></td>
      <td><span class="sector-tag">${e.sector}</span></td>
      <td>${renderBadge(e.daily)}</td>
      <td>${renderBadge(e.ytd)}</td>
    </tr>
  `).join('');

  document.querySelectorAll('.etf-table th span').forEach(el => el.className = 'sort-arrow');
  const idx = ['name','code','sector','daily','ytd'].indexOf(sortCol);
  if (idx >= 0) {
    document.querySelectorAll('.etf-table th span')[idx].className = sortDir === 'asc' ? 'sort-asc' : 'sort-desc';
  }
}

function renderStats() {
  const up = etfData.filter(e => e.daily > 0).length;
  const down = etfData.filter(e => e.daily < 0).length;
  const flat = etfData.length - up - down;
  const avgDaily = (etfData.reduce((s, x) => s + x.daily, 0) / etfData.length).toFixed(2);
  const avgYtd = (etfData.reduce((s, x) => s + x.ytd, 0) / etfData.length).toFixed(2);
  document.getElementById('statsPanel').innerHTML = `
    <div class="stat-item"><div class="stat-value" style="color:#ff7b72">${up}</div><div class="stat-label">上涨</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#7ee787">${down}</div><div class="stat-label">下跌</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#8b949e">${flat}</div><div class="stat-label">平盘</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#58a6ff">${avgDaily}%</div><div class="stat-label">平均涨跌</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#d2a8ff">${avgYtd}%</div><div class="stat-label">平均年度</div></div>
    <div class="stat-item"><div class="stat-value" style="color:#e6edf3">${etfData.length}</div><div class="stat-label">ETF总数</div></div>
  `;
}

function refreshData() {
  updateStatus('正在获取实时数据...');
  fetchETFData().then(etfs => {
    if (etfs && etfs.length > 0) {
      etfData = etfs.map(e => ({ ...e, sector: classifySector(e.name) }));
      dataSource = '腾讯财经';
      updateStatus(`${dataSource} · ${etfData.length}只ETF · 刚刚`);
      renderCharts();
      renderTable();
      renderStats();
      showToast('数据已刷新');
      // 尝试保存到扩展 storage
      try {
        chrome.storage?.local?.set({
          aidinpan_etfs: etfs,
          last_update: Date.now(),
          source: 'tencent_api'
        });
      } catch (e) {}
    } else {
      updateStatus('获取数据失败');
      showToast('获取失败');
    }
  }).catch(e => {
    console.error(e);
    updateStatus('刷新失败: ' + e.message);
    showToast('刷新失败');
  });
}

function sortTable(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'desc'; }
  renderTable();
}

// ======================== 编辑功能 ========================
function toggleEditor() {
  const el = document.getElementById('editor');
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  document.getElementById('dataEditor').value = JSON.stringify(etfData, null, 2);
  el.style.display = 'block';
}
function saveData() {
  try {
    const v = JSON.parse(document.getElementById('dataEditor').value);
    if (!Array.isArray(v)) throw new Error('必须是数组');
    etfData = v.map(e => ({ ...e, sector: classifySector(e.name) }));
    renderCharts();
    renderTable();
    renderStats();
    document.getElementById('editor').style.display = 'none';
    showToast('数据已保存');
  } catch (e) {
    alert('JSON格式错误: ' + e.message);
  }
}
function loadDefault() {
  if (!confirm('确定恢复默认数据？当前修改会丢失')) return;
  etfData = JSON.parse(JSON.stringify(DEFAULT_ETFS));
  document.getElementById('dataEditor').value = JSON.stringify(etfData, null, 2);
  renderCharts();
  renderTable();
  renderStats();
  showToast('已恢复默认数据');
}
function cancelEdit() { document.getElementById('editor').style.display = 'none'; }
function exportData() {
  const blob = new Blob([JSON.stringify(etfData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'etf_data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 etf_data.json');
}
function importData() {
  const file = document.getElementById('importFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('必须是数组');
      etfData = data.map(e => ({ ...e, sector: classifySector(e.name) }));
      renderCharts();
      renderTable();
      renderStats();
      showToast('数据已导入');
    } catch (err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.addEventListener('resize', () => { dailyChart?.resize(); ytdChart?.resize(); });

updateStatus('默认数据 · 38只ETF');
renderCharts();
renderTable();
renderStats();

// 尝试自动从扩展读取（或直接刷新）
setTimeout(() => {
  let initDone = false;
  function doInit() {
    if (initDone) return;
    initDone = true;
    refreshData();
  }
  try {
    if (typeof chrome !== 'undefined' && chrome.storage?.local?.get) {
      chrome.storage.local.get(['aidinpan_etfs', 'last_update', 'source'], (result) => {
        if (initDone) return;
        initDone = true;
        if (result?.aidinpan_etfs && result.aidinpan_etfs.length > 0) {
          if (result.source !== 'tencent_api') {
            refreshData();
            return;
          }
          etfData = result.aidinpan_etfs.map(e => ({ ...e, sector: classifySector(e.name) }));
          dataSource = result.source === 'tencent_api' ? '腾讯财经' : '爱盯盘';
          const age = result.last_update ? Math.round((Date.now() - result.last_update) / 1000) : 0;
          const ageStr = age < 60 ? '刚刚' : age < 3600 ? `${Math.round(age/60)}分钟前` : `${Math.round(age/3600)}小时前`;
          updateStatus(`${dataSource} · ${etfData.length}只ETF · ${ageStr}`);
          renderCharts();
          renderTable();
          renderStats();
        } else {
          refreshData();
        }
      });
      setTimeout(doInit, 3000);
    } else {
      doInit();
    }
  } catch (e) {
    doInit();
  }
}, 500);
</script>
