<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ETF 资金流向</title>
  <script src="/extension/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #c9d1d9; padding: 14px; }
    h1 { text-align: center; color: #58a6ff; font-size: 24px; margin: 8px 0 4px; }
    .sub { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 12px; }
    .bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0 16px; }
    .btn, .btn2, .btn3 { border: 0; border-radius: 6px; padding: 8px 14px; color: white; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn { background: #238636; }
    .btn2 { background: #1f6feb; }
    .btn3 { background: #30363d; color: #c9d1d9; }
    .btn.active { background: #f0883e; }
    .action-status { width: 100%; text-align: center; color: #8b949e; font-size: 12px; min-height: 18px; }
    .action-status.ok { color: #7ee787; }
    .action-status.warn { color: #d29922; }
    .action-status.bad { color: #ff7b72; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
    .stat .label { color: #8b949e; font-size: 12px; margin-bottom: 5px; }
    .stat .val { font-size: 18px; font-weight: 800; color: #e6edf3; }
    .layout { display: grid; grid-template-columns: minmax(560px, 0.9fr) minmax(620px, 1.1fr); gap: 12px; align-items: start; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .toggle { padding: 6px 10px; border-radius: 5px; background: #0d1117; border: 1px solid #30363d; color: #8b949e; cursor: pointer; font-size: 12px; }
    .toggle.active { color: white; border-color: #1f6feb; background: #1f6feb; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 8px 7px; border-bottom: 1px solid #21262d; text-align: left; white-space: nowrap; }
    th { color: #8b949e; background: #0d1117; position: sticky; top: 0; z-index: 1; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: #e6edf3; }
    tr { cursor: pointer; }
    tr:hover, tr.selected { background: #1c2633; }
    .table-wrap { max-height: 650px; overflow: auto; border: 1px solid #21262d; border-radius: 6px; }
    .money { font-size: 16px; font-weight: 800; }
    .up { color: #ff7b72; }
    .down { color: #7ee787; }
    .flat { color: #8b949e; }
    .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #30363d; color: #c9d1d9; margin-right: 4px; }
    .tag.warn { background: #332800; color: #d29922; }
    .tag.bad { background: #3d1f1f; color: #ff7b72; }
    .detail-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .detail-title { font-size: 18px; font-weight: 800; color: #e6edf3; }
    .muted { color: #8b949e; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
    .metric { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px; }
    .metric .label { font-size: 11px; color: #8b949e; }
    .metric .val { margin-top: 4px; font-size: 15px; font-weight: 800; }
    #flowChart { height: 360px; margin-top: 8px; }
    #rankChart { height: 640px; }
    .status { margin-top: 12px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .auto-line { display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 12px; color: #8b949e; margin: -6px 0 12px; flex-wrap: wrap; }
    .auto-line .dot { width: 8px; height: 8px; border-radius: 50%; background: #30363d; display: inline-block; }
    .auto-line .dot.ok { background: #7ee787; }
    .auto-line .dot.warn { background: #d29922; }
    .auto-line .dot.bad { background: #ff7b72; }
    .auto-line .detail-link { color: #58a6ff; cursor: pointer; text-decoration: underline; }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-mask.show { display: flex; }
    .modal { background: #161b22; border: 1px solid #30363d; border-radius: 10px; width: min(860px, 92vw); max-height: 80vh; overflow: auto; padding: 16px; }
    .modal h3 { color: #e6edf3; font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .modal h3 .close { cursor: pointer; color: #8b949e; font-size: 20px; line-height: 1; }
    .modal h3 .close:hover { color: #e6edf3; }
    .modal table { font-size: 12px; }
    .modal td, .modal th { white-space: normal; }
    @media (max-width: 1180px) { .layout, .summary, .status { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>ETF 资金流向</h1>
  <div class="sub" id="subtitle">ETF 自身资金流 · 按现有板块汇总</div>
  <div class="bar">
    <a class="btn3" href="/">返回大盘</a>
    <a class="btn3" href="/analysis">机会分析</a>
    <button class="btn2" id="refreshBtn">刷新资金流</button>
    <button class="btn3" id="backfillBtn">补历史资金流</button>
    <div class="action-status" id="actionStatus"></div>
  </div>
  <div class="auto-line" id="autoLine">
    <span class="dot" id="autoDot"></span>
    <span id="autoText">自动更新状态加载中...</span>
    <span class="detail-link" id="updateDetailBtn">更新详情</span>
  </div>

  <div class="modal-mask" id="updateModal">
    <div class="modal">
      <h3>资金流更新详情 <span class="close" id="updateModalClose">×</span></h3>
      <div class="muted" id="updateModalMeta" style="font-size:12px;margin-bottom:8px"></div>
      <table>
        <thead>
          <tr><th>时间</th><th>触发</th><th>结果</th><th>快照</th><th>变化</th><th>日内</th><th>耗时</th><th>错误</th></tr>
        </thead>
        <tbody id="updateLogBody"></tbody>
      </table>
    </div>
  </div>

  <section class="summary">
    <div class="card stat"><div class="label">主力流入 Top 5</div><div class="val" id="topIn">-</div></div>
    <div class="card stat"><div class="label">主力流出 Top 5</div><div class="val" id="topOut">-</div></div>
    <div class="card stat"><div class="label">ETF 覆盖</div><div class="val" id="coverage">-</div></div>
    <div class="card stat"><div class="label">更新时间</div><div class="val" id="updatedAt">-</div></div>
  </section>

  <section class="card" style="margin-bottom:12px">
    <div class="detail-head">
      <div>
        <div class="detail-title">板块资金流排名图</div>
        <div class="muted" id="rankChartHelp">按 ETF 自身资金流汇总，红色为净流入，绿色为净流出</div>
      </div>
      <div class="muted" id="rankChartPeriod">实时</div>
    </div>
    <div class="filters" id="rankPeriodBar">
      <button class="toggle active period" data-period="realtime">实时</button>
      <button class="toggle period" data-period="3d">3日</button>
      <button class="toggle period" data-period="5d">5日</button>
      <button class="toggle period" data-period="15d">15日</button>
      <button class="toggle period" data-period="month">月</button>
      <button class="toggle period" data-period="3m">3个月</button>
      <button class="toggle period" data-period="6m">半年</button>
      <button class="toggle period" data-period="1y">一年</button>
    </div>
    <div class="filters" id="rankMetricBar">
      <span class="muted">资金口径</span>
      <button class="toggle active metric-mode" data-metric="mainNet">主力</button>
      <button class="toggle metric-mode" data-metric="retailNet">散户</button>
      <button class="toggle metric-mode" data-metric="amount">成交额</button>
      <button class="toggle metric-mode" data-metric="superLargeNet">超大单</button>
      <button class="toggle metric-mode" data-metric="largeNet">大单</button>
      <button class="toggle metric-mode" data-metric="midNet">中单</button>
      <button class="toggle metric-mode" data-metric="smallNet">小单</button>
    </div>
    <div id="rankChart"></div>
  </section>

  <main class="layout">
    <section class="card">
      <div class="filters">
        <strong>板块资金排名</strong>
        <span class="muted" id="tablePeriodLabel">实时</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="sector">板块</th>
              <th class="sortable" data-sort="mainNet">主力净流入</th>
              <th class="sortable" data-sort="mainRatio">净占比</th>
              <th class="sortable" data-sort="superLargeNet">超大单</th>
              <th class="sortable" data-sort="largeNet">大单</th>
              <th class="sortable" data-sort="etfCount">ETF</th>
            </tr>
          </thead>
          <tbody id="rankBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="detail-head">
        <div>
          <div class="detail-title" id="detailTitle">选择一个板块</div>
          <div class="muted" id="detailDesc">ETF 资金流明细和板块折线</div>
        </div>
        <div class="money" id="detailMoney">-</div>
      </div>
      <div class="metric-grid" id="metrics"></div>
      <div class="filters">
        <button class="toggle active timeline" data-period="intraday">日内</button>
        <button class="toggle timeline" data-period="daily">日线</button>
        <button class="toggle timeline" data-period="month">月内</button>
      </div>
      <div id="flowChart"></div>
      <div style="margin-top:10px">
        <strong>ETF 明细</strong>
        <table style="margin-top:6px">
          <thead><tr><th>名称</th><th>代码</th><th>主力净流入</th><th>净占比</th><th>成交额</th><th>涨跌幅</th></tr></thead>
          <tbody id="etfBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <section class="status" id="statusCards"></section>

  <script src="/fund-flow.js"></script>
</body>
</html>
