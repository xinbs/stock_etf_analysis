services:
  stock-analysis:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: stock-analysis-server:latest
    container_name: stock-analysis-server
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8787
      - DATA_DIR=/data
